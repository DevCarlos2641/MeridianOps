<div class="body">
    <div class="camera">
        <div class="container">
            <div>
                @if (currentEmployed) {
                <h2 style="text-align: center;">{{currentEmployed.name}}</h2>
                }
                <video #video autoplay playsinline width="640" height="480"></video>
                <canvas #canvas width="640" height="480" hidden></canvas>
            </div>
        </div>
        <div class="user-list">
            <mat-slide-toggle [(ngModel)]="tardeada">Tardeada</mat-slide-toggle><br><br>
            <mat-form-field appearance="outline">
                <mat-label>Buscar por nombre</mat-label>
                <input matInput placeholder="Nombre" [formControl]="filtre">
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
            <div class="list">
                @if(filteredEmployed$ | async; as employes){
                @for (item of employes; track $index) {
                <div class="item" (click)="onSelectEmployed(item)">
                    <div style="text-align: start;">
                        <p>{{item.name}}</p>
                        <p>{{item.position}}</p>
                    </div>
                    <div style="text-align: end;">
                        <p>{{item.enterprise}}</p>
                        <p>{{item.seniority}}</p>
                    </div>
                </div>
                <mat-divider></mat-divider>
                }
                }
            </div>
        </div>
    </div>
    <div style="display: flex; justify-content: center;">
        <button matButton="filled" (click)="take()">Tomar foto</button><br>
    </div>
</div>
